    <a href="index.html">Home</a> |
    <a href="placements.html">Placements</a> |
    <a href="submit.html">Submit Information</a>

</center>

<form>
    <p>
        Company Name:<br>
        <input type="text" placeholder="eg. Google">
    </p>

    <p>
        Job Role:<br>
        <input type="text" placeholder="eg. Software Engineer">
    </p>

    <p>
        Package (LPA):<br>
        <input type="number">
    </p>

    <p>
        Location:<br>
        <input type="text" placeholder="eg. Chennai">
    </p>

    <p>
        Batch:<br>
        <input type="number" placeholder="eg. 2025">
    </p>

    <p>
        Additional Details:<br>
        <textarea rows="4" cols="40"></textarea>
    </p>

    <p>
        <input type="submit" value="Submit">
    </p>
